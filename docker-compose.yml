# Local-first infra (ADR-0002 / ADR-0006): services run as containers, never on the host,
# configured entirely from the environment (see .env.example). Bring the whole skeleton up with
# `docker compose up --build`, then hit http://localhost:8080/health.
#
# Images are pinned by digest (container baseline) so `up` is reproducible from a clean checkout.

name: conduit

services:
  postgres:
    image: postgres:16@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-conduit}
      POSTGRES_USER: ${POSTGRES_USER:-conduit}
      # No default — compose refuses to start if the password isn't set (no silent weak secret).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copy .env.example to .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conduit} -d ${POSTGRES_DB:-conduit}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis is a stub for later (sliding-window rate limiting + the delivery job queue, per CLAUDE.md).
  # Nothing in the skeleton talks to it yet; it is here so the service topology is in place.
  redis:
    image: redis:7@sha256:d3be87a1060455213a204d2b0a7f04d45d19a16a98e85b3c37b7c33b5f0c489e
    ports:
      - "${REDIS_PORT:-6379}:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: conduit:dev
    depends_on:
      postgres:
        condition: service_healthy   # wait for Postgres to accept connections before booting
    environment:
      SERVER_PORT: 8080
      # Reach Postgres by its compose service name on the internal network.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-conduit}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-conduit}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copy .env.example to .env}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:
