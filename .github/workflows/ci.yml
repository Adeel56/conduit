# CI for pull requests into main. This is the agent-safety harness the project relies on: every
# change is built, tested, and security-scanned before it can merge. The jobs run in parallel so
# feedback stays fast; CodeQL static analysis lives in its own workflow (codeql.yml).
#
# Actions are pinned by full commit SHA (supply-chain control — tags are mutable); the trailing
# `# vX.Y.Z` comments are for humans / Dependabot.

name: CI

on:
  pull_request:
    branches: [main]
  # Also run on pushes to main (post-merge) as a backstop.
  push:
    branches: [main]

# Deny by default; jobs elevate only what they need.
permissions:
  contents: read

concurrency:
  # Cancel superseded runs on the same branch/PR to save CI minutes.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read   # explicit (matches the other jobs); needs nothing beyond checkout
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin   # matches ADR-0006 (Temurin via SDKMAN locally)
          java-version: '21'
          cache: maven             # cache ~/.m2 keyed on pom.xml

      - name: Build and test
        run: ./mvnw -B -ntp verify

  trivy-image-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read          # checkout
      security-events: write  # upload SARIF to the Security tab (non-fatal; see the upload step)
    env:
      IMAGE: conduit:ci-${{ github.sha }}
      # Pull the vulnerability DBs from GHCR to avoid Docker Hub rate-limit flakiness.
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
      # Stable, workspace-relative cache dir for Trivy's downloaded DBs. We cache this dir
      # ourselves (date-keyed, see below) instead of leaving it to the action's built-in cache,
      # so the key is explicit and auditable. Trivy reads/writes its DBs here.
      TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Date stamp (UTC, YYYY-MM-DD) used in the Trivy DB cache key. GitHub Actions has no native
      # date expression, so we compute one here. A new day -> a new key -> a guaranteed cold cache
      # for that day -> Trivy redownloads a fresh DB. This is what makes the date-keyed cache safe:
      # it can never serve a stale DB beyond the day it was fetched (no stale-DB false-negative).
      - name: Compute DB cache date
        id: trivy-db-date
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      # Cache only the Trivy vulnerability DBs (not scan results), keyed by date so the DB is
      # downloaded ~once/day instead of every run. restore-keys falls back to the most recent
      # earlier-day cache so a brand-new day still starts from a warm-ish dir; Trivy then refreshes
      # only the parts that are out of date. We own this cache explicitly and set `cache: false` on
      # the trivy-action steps below so the action does not also cache the same dir (no double save).
      - name: Cache Trivy vulnerability DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-${{ steps.trivy-db-date.outputs.date }}
          restore-keys: |
            trivy-db-

      # buildx gives us a builder that can export/import a layer cache (type=gha). Needed for the
      # cache-from/cache-to on the build step below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Build the exact image this PR would ship and scan THAT (not a registry image). Layer cache
      # is read from / written to the GitHub Actions cache (type=gha, mode=max caches intermediate
      # stages too), so warm runs skip the heavy Maven dependency + jar layers. `load: true` loads
      # the built image into the local Docker daemon so Trivy can scan it by ref.
      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          tags: ${{ env.IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step A — produce SARIF for the Security tab. Never fails the job (exit-code 0); the gate is
      # step B. `limit-severities-for-sarif` is required or the SARIF ignores `severity` and floods
      # the Security tab with LOW/MEDIUM noise.
      - name: Trivy scan (SARIF for the Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '0'
          # We manage the DB cache ourselves (date-keyed actions/cache above), so disable the
          # action's built-in cache to avoid two cache entries fighting over the same dir. Trivy
          # still reads/writes the cached DBs via TRIVY_CACHE_DIR (set on the job env) and only
          # redownloads when its own DB metadata says the cached DB is stale.
          cache: false

      # Upload even if the gate (step B) fails (if: always), and don't let a private-repo
      # "code scanning not enabled" 403 fail the job (continue-on-error) — step B is the
      # authoritative pass/fail. Distinct category so it won't merge with CodeQL's results.
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # Step B — the gate. `format: table` makes exit-code reliable (with format: sarif the action
      # is known to write the file but exit 0 even on findings). exit-code 1 turns the job red on a
      # *fixable* HIGH/CRITICAL. Inputs MUST match step A so the Security tab and the gate agree.
      - name: Trivy scan (fail the build on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'
          skip-setup-trivy: true   # reuse the Trivy binary + cached DB from step A
          cache: false             # same as step A: our date-keyed cache owns TRIVY_CACHE_DIR
