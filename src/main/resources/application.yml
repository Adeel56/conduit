spring:
  application:
    name: conduit

  # ADR-0004: virtual threads. Request handling and (later) blocking delivery code run on
  # virtual threads, so simple synchronous code scales to large I/O concurrency.
  threads:
    virtual:
      enabled: true

  # 12-factor config (ADR-0006): the datasource is read from the environment, never hardcoded.
  # No defaults for credentials on purpose — the app must be told where its DB is.
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false        # don't hold a DB connection open for the whole request
    hibernate:
      ddl-auto: validate       # schema is owned by Flyway, never by Hibernate auto-DDL

  # Flyway owns the schema. The baseline migration proves the migration pipeline runs.
  flyway:
    enabled: true
    locations: classpath:db/migration

# Actuator: expose only /health, mapped to the root path so the URL is GET /health (ticket AC).
# Details are hidden from anonymous callers (secure default) — the public body is {"status":"UP"}.
# The DB still factors into the aggregate status, so a DB outage flips /health to 503 DOWN.
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true          # adds /health/liveness and /health/readiness for later Kubernetes

server:
  port: ${SERVER_PORT:8080}

# Conduit application config. 12-factor: override via env, e.g. CONDUIT_INGEST_MAXBODYSIZE=512KB.
conduit:
  ingest:
    # Hard cap on a received webhook body; larger requests are rejected with 413 before any storage
    # work (abuse / memory-exhaustion guard). Accepts sizes like 512KB, 1MB, 2MB.
    max-body-size: 1MB

  # Delivery engine (CON-13). The worker delivers stored events to destinations with retries + backoff.
  delivery:
    enabled: true            # master switch for the background worker's scheduled poll
    poll-interval: 1s        # how often the worker claims due deliveries
    batch-size: 50           # max deliveries claimed per poll
    max-attempts: 5          # attempt cap; past it a delivery is dead-lettered (failed)
    backoff-base: 1s         # exponential retry base (1s, 4s, 16s, ... before jitter)
    backoff-max: 5m          # ceiling on a single backoff delay
    connect-timeout: 5s      # outbound HTTP connect timeout
    request-timeout: 10s     # outbound HTTP overall timeout (no worker hangs on a dead destination)
